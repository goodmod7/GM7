name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: beta
        type: choice
        options:
          - beta
          - stable

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.context.outputs.channel }}
      version: ${{ steps.context.outputs.version }}
      prerelease: ${{ steps.context.outputs.prerelease }}
      updater_enabled: ${{ steps.context.outputs.updater_enabled }}
      release_name: ${{ steps.context.outputs.release_name }}
      release_label: ${{ steps.context.outputs.release_label }}
      trust_status: ${{ steps.context.outputs.trust_status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve release context
        id: context
        shell: bash
        run: |
          set -euo pipefail

          RAW_REF="${GITHUB_REF_NAME:-}"
          EVENT_NAME="${GITHUB_EVENT_NAME}"
          INPUT_CHANNEL="${{ github.event.inputs.channel }}"

          if [[ "$EVENT_NAME" == "push" ]]; then
            if [[ "$RAW_REF" =~ ^v.+-beta\.[0-9]+$ ]]; then
              CHANNEL="beta"
            elif [[ "$RAW_REF" =~ ^v.+$ ]]; then
              CHANNEL="stable"
            else
              echo "::error::Unsupported release tag '$RAW_REF'. Use vX.Y.Z for stable or vX.Y.Z-beta.N for beta."
              exit 1
            fi
            VERSION="${RAW_REF#v}"
          else
            CHANNEL="${INPUT_CHANNEL:-beta}"
            VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          fi

          if [[ "$CHANNEL" == "stable" && "$VERSION" == *"-beta."* ]]; then
            echo "::error::Stable releases cannot use beta version strings ($VERSION)."
            exit 1
          fi

          if [[ "$CHANNEL" == "beta" && "$EVENT_NAME" == "push" && "$VERSION" != *"-beta."* ]]; then
            echo "::error::Beta release tags must use the vX.Y.Z-beta.N format."
            exit 1
          fi

          if [[ "$CHANNEL" == "stable" ]]; then
            PRERELEASE="false"
            UPDATER_ENABLED="true"
            RELEASE_LABEL="SIGNED STABLE"
            TRUST_STATUS="Windows Authenticode signed; macOS Developer ID signed and notarized"
            RELEASE_NAME="AI Operator Desktop v${VERSION}"
          else
            PRERELEASE="true"
            UPDATER_ENABLED="false"
            RELEASE_LABEL="UNSIGNED BETA"
            TRUST_STATUS="Unsigned beta artifacts only"
            RELEASE_NAME="AI Operator Desktop v${VERSION} (beta)"
          fi

          printf 'channel=%s\n' "$CHANNEL" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'prerelease=%s\n' "$PRERELEASE" >> "$GITHUB_OUTPUT"
          printf 'updater_enabled=%s\n' "$UPDATER_ENABLED" >> "$GITHUB_OUTPUT"
          printf 'release_name=%s\n' "$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          printf 'release_label=%s\n' "$RELEASE_LABEL" >> "$GITHUB_OUTPUT"
          printf 'trust_status=%s\n' "$TRUST_STATUS" >> "$GITHUB_OUTPUT"

      - name: Validate stable signing and notarization secrets
        if: steps.context.outputs.channel == 'stable'
        shell: bash
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          required=(
            TAURI_PRIVATE_KEY
            TAURI_KEY_PASSWORD
            WINDOWS_CERT_PFX_BASE64
            WINDOWS_CERT_PASSWORD
            MACOS_CERT_P12_BASE64
            MACOS_CERT_PASSWORD
            MACOS_KEYCHAIN_PASSWORD
          )

          for secret_name in "${required[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("$secret_name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Stable channel is missing required GitHub Actions secrets: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

          api_key_mode=true
          for secret_name in APPLE_API_KEY_ID APPLE_API_ISSUER_ID APPLE_API_KEY_P8_BASE64; do
            if [[ -z "${!secret_name:-}" ]]; then
              api_key_mode=false
              break
            fi
          done

          apple_id_mode=true
          for secret_name in APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [[ -z "${!secret_name:-}" ]]; then
              apple_id_mode=false
              break
            fi
          done

          if [[ "$api_key_mode" != "true" && "$apple_id_mode" != "true" ]]; then
            echo "::error::Stable channel requires notarization credentials. Provide either APPLE_API_KEY_ID + APPLE_API_ISSUER_ID + APPLE_API_KEY_P8_BASE64 or APPLE_ID + APPLE_TEAM_ID + APPLE_APP_SPECIFIC_PASSWORD."
            exit 1
          fi

  build-windows:
    runs-on: windows-latest
    needs:
      - prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Build Windows bundle
        shell: bash
        run: pnpm --filter @ai-operator/desktop exec tauri build --bundles msi

      - name: Normalize Windows asset names
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $msiSource = Get-ChildItem -Path apps/desktop/src-tauri/target/release/bundle/msi -Filter *.msi -File -Recurse | Select-Object -First 1
          if (-not $msiSource) {
            Write-Error "Windows MSI bundle was not produced."
            exit 1
          }

          $normalizedAsset = "release-assets/ai-operator-desktop_${env:RELEASE_VERSION}_windows_x86_64.msi"
          Copy-Item $msiSource.FullName $normalizedAsset -Force
          "WINDOWS_ASSET_PATH=$normalizedAsset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Decode Windows signing certificate
        if: needs.prepare.outputs.channel == 'stable'
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'windows-release-signing.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          "WINDOWS_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Authenticode sign Windows installer
        if: needs.prepare.outputs.channel == 'stable'
        shell: pwsh
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          & $signtool sign /fd SHA256 /f $env:WINDOWS_CERT_PATH /p $env:WINDOWS_CERT_PASSWORD /tr http://timestamp.digicert.com /td SHA256 $env:WINDOWS_ASSET_PATH
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify Windows signature
        if: needs.prepare.outputs.channel == 'stable'
        shell: pwsh
        run: |
          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          & $signtool verify /pa $env:WINDOWS_ASSET_PATH
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Generate stable updater signature for Windows artifact
        if: needs.prepare.outputs.channel == 'stable'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          pnpm --filter @ai-operator/desktop exec tauri signer sign "$WINDOWS_ASSET_PATH"
          test -f "$WINDOWS_ASSET_PATH.sig"

      - name: Assert beta artifacts do not contain updater signatures
        if: needs.prepare.outputs.channel != 'stable'
        shell: pwsh
        run: |
          $sigFile = Get-ChildItem -Path release-assets -Filter *.sig -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($sigFile) {
            Write-Error "Beta artifacts must not upload updater signatures."
            exit 1
          }

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-windows
          path: release-assets/*

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
          - runner: macos-14
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    needs:
      - prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Import Developer ID certificate into temporary keychain
        if: needs.prepare.outputs.channel == 'stable'
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/macos-release-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ai-operator-release.keychain-db"
          CONFIG_PATH="$RUNNER_TEMP/macos-signing-config.json"

          printf '%s' "$MACOS_CERT_P12_BASE64" | base64 -D > "$CERT_PATH"

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::Developer ID Application identity was not found in the temporary keychain."
            exit 1
          fi

          cat > "$CONFIG_PATH" <<EOF
          {
            "bundle": {
              "macOS": {
                "signingIdentity": $(node -p "JSON.stringify(process.argv[1])" "$SIGNING_IDENTITY")
              }
            }
          }
          EOF

          printf 'MACOS_TAURI_CONFIG=%s\n' "$CONFIG_PATH" >> "$GITHUB_ENV"
          printf 'MACOS_SIGNING_IDENTITY=%s\n' "$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Build macOS bundle for stable channel
        if: needs.prepare.outputs.channel == 'stable'
        shell: bash
        run: pnpm --filter @ai-operator/desktop exec tauri build --config "$MACOS_TAURI_CONFIG" --bundles dmg

      - name: Build macOS bundle for beta channel
        if: needs.prepare.outputs.channel != 'stable'
        shell: bash
        run: pnpm --filter @ai-operator/desktop exec tauri build --bundles dmg

      - name: Verify macOS app signature
        if: needs.prepare.outputs.channel == 'stable'
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(find apps/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "::error::macOS app bundle was not produced."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Normalize macOS asset names
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          DMG_SOURCE="$(find apps/desktop/src-tauri/target/release/bundle/dmg -type f -name '*.dmg' | head -n 1)"
          if [[ -z "$DMG_SOURCE" ]]; then
            echo "::error::macOS DMG bundle was not produced."
            exit 1
          fi

          mkdir -p release-assets
          TARGET_NAME="release-assets/ai-operator-desktop_${RELEASE_VERSION}_macos_${RELEASE_ARCH}.dmg"
          cp "$DMG_SOURCE" "$TARGET_NAME"
          printf 'MACOS_ASSET_PATH=%s\n' "$TARGET_NAME" >> "$GITHUB_ENV"

      - name: Notarize and staple macOS artifact
        if: needs.prepare.outputs.channel == 'stable'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER_ID:-}" && -n "${APPLE_API_KEY_P8_BASE64:-}" ]]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$API_KEY_PATH"
            xcrun notarytool submit "$MACOS_ASSET_PATH" --wait --key "$API_KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID"
          else
            xcrun notarytool submit "$MACOS_ASSET_PATH" --wait --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          fi

          xcrun stapler staple "$MACOS_ASSET_PATH"
          spctl -a -vv "$MACOS_ASSET_PATH" || spctl -a -t open --context context:primary-signature -vv "$MACOS_ASSET_PATH"

      - name: Generate stable updater signature for macOS artifact
        if: needs.prepare.outputs.channel == 'stable'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          pnpm --filter @ai-operator/desktop exec tauri signer sign "$MACOS_ASSET_PATH"
          test -f "$MACOS_ASSET_PATH.sig"

      - name: Assert beta artifacts do not contain updater signatures
        if: needs.prepare.outputs.channel != 'stable'
        shell: bash
        run: |
          set -euo pipefail
          if find release-assets -type f -name '*.sig' | grep -q .; then
            echo "::error::Beta artifacts must not upload updater signatures."
            exit 1
          fi

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-macos-${{ matrix.arch }}
          path: release-assets/*

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-windows
      - build-macos
    permissions:
      contents: write
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ needs.prepare.outputs.channel }}
          RELEASE_LABEL: ${{ needs.prepare.outputs.release_label }}
          TRUST_STATUS: ${{ needs.prepare.outputs.trust_status }}
          UPDATER_ENABLED: ${{ needs.prepare.outputs.updater_enabled }}
        run: |
          set -euo pipefail

          if [[ "$UPDATER_ENABLED" == "true" ]]; then
            UPDATER_STATUS="enabled"
          else
            UPDATER_STATUS="disabled"
          fi

          cat > release-notes.md <<EOF
          Channel: ${RELEASE_CHANNEL}
          Release lane: ${RELEASE_LABEL}
          Artifact trust: ${TRUST_STATUS}
          Updater promotion: ${UPDATER_STATUS}
          EOF

          if [[ "$RELEASE_CHANNEL" == "beta" ]]; then
            cat >> release-notes.md <<'EOF'

          UNSIGNED BETA

          This GitHub pre-release is for internal testing only.
          Auto-update promotion is disabled and stable clients following DESKTOP_RELEASE_TAG=latest will ignore it by default.
          EOF
          else
            cat >> release-notes.md <<'EOF'

          Signed stable release.
          Auto-update promotion is enabled only because the uploaded artifacts are signed, notarized where required, and accompanied by updater signatures generated after final packaging.
          EOF
          fi

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: release-notes.md
          files: release-assets/*
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
