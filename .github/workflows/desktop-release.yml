name: Desktop Release

on:
  push:
    tags:
      - 'v*'
      - 'prod-*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Release mode for signing enforcement'
        required: true
        default: unsigned
        type: choice
        options:
          - unsigned
          - signed

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Determine release version
        id: version
        shell: bash
        run: |
          RAW_REF="${GITHUB_REF_NAME}"
          if [[ "$RAW_REF" == v* ]]; then
            VERSION="${RAW_REF#v}"
          elif [[ "$RAW_REF" == prod-* ]]; then
            VERSION="${RAW_REF#prod-}"
          else
            VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve release mode + signing requirements
        id: release_mode
        shell: bash
        env:
          INPUT_RELEASE_MODE: ${{ github.event.inputs.release_mode }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          MODE="${INPUT_RELEASE_MODE:-unsigned}"
          if [[ "${GITHUB_REF_NAME}" == prod-* ]]; then
            MODE="signed"
          fi

          if [[ "$MODE" == "signed" ]]; then
            if [[ -z "$TAURI_PRIVATE_KEY" || -z "$TAURI_KEY_PASSWORD" ]]; then
              echo "Signed mode requires TAURI_PRIVATE_KEY and TAURI_KEY_PASSWORD" >&2
              exit 1
            fi
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "label=SIGNED" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "label=UNSIGNED" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows bundle (signed)
        if: steps.release_mode.outputs.signed == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: pnpm --filter @ai-operator/desktop tauri build -- --bundles msi

      - name: Build Windows bundle (unsigned)
        if: steps.release_mode.outputs.signed != 'true'
        shell: bash
        run: pnpm --filter @ai-operator/desktop tauri build -- --bundles msi

      - name: Normalize Windows asset names
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets
          MSI_SOURCE="$(find apps/desktop/src-tauri/target/release/bundle/msi -type f -name '*.msi' | head -n 1)"
          cp "$MSI_SOURCE" "release-assets/ai-operator-desktop_${VERSION}_windows_x86_64.msi"
          if [[ -f "${MSI_SOURCE}.sig" ]]; then
            cp "${MSI_SOURCE}.sig" "release-assets/ai-operator-desktop_${VERSION}_windows_x86_64.msi.sig"
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-windows
          path: release-assets/*

      - name: Upload Windows assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: |
            Release mode: ${{ steps.release_mode.outputs.label }}

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
          - runner: macos-14
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Determine release version
        id: version
        shell: bash
        run: |
          RAW_REF="${GITHUB_REF_NAME}"
          if [[ "$RAW_REF" == v* ]]; then
            VERSION="${RAW_REF#v}"
          elif [[ "$RAW_REF" == prod-* ]]; then
            VERSION="${RAW_REF#prod-}"
          else
            VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve release mode + signing requirements
        id: release_mode
        shell: bash
        env:
          INPUT_RELEASE_MODE: ${{ github.event.inputs.release_mode }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          MODE="${INPUT_RELEASE_MODE:-unsigned}"
          if [[ "${GITHUB_REF_NAME}" == prod-* ]]; then
            MODE="signed"
          fi

          if [[ "$MODE" == "signed" ]]; then
            if [[ -z "$TAURI_PRIVATE_KEY" || -z "$TAURI_KEY_PASSWORD" ]]; then
              echo "Signed mode requires TAURI_PRIVATE_KEY and TAURI_KEY_PASSWORD" >&2
              exit 1
            fi
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "label=SIGNED" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "label=UNSIGNED" >> "$GITHUB_OUTPUT"
          fi

      - name: Build macOS bundle (signed)
        if: steps.release_mode.outputs.signed == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: pnpm --filter @ai-operator/desktop tauri build -- --bundles dmg

      - name: Build macOS bundle (unsigned)
        if: steps.release_mode.outputs.signed != 'true'
        shell: bash
        run: pnpm --filter @ai-operator/desktop tauri build -- --bundles dmg

      - name: Normalize macOS asset names
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets
          DMG_SOURCE="$(find apps/desktop/src-tauri/target/release/bundle/dmg -type f -name '*.dmg' | head -n 1)"
          TARGET_NAME="release-assets/ai-operator-desktop_${VERSION}_macos_${{ matrix.arch }}.dmg"
          cp "$DMG_SOURCE" "$TARGET_NAME"
          if [[ -f "${DMG_SOURCE}.sig" ]]; then
            cp "${DMG_SOURCE}.sig" "${TARGET_NAME}.sig"
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-macos-${{ matrix.arch }}
          path: release-assets/*

      - name: Upload macOS assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: |
            Release mode: ${{ steps.release_mode.outputs.label }}
