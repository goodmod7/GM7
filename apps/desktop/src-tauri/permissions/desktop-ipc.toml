[[permission]]
identifier = "desktop-ipc"
description = "Allows the main desktop window to invoke the audited application IPC commands."

commands.allow = [
  "autostart_is_enabled",
  "autostart_set_enabled",
  "autostart_supported",
  "cancel_agent_task",
  "capture_display_png",
  "clear_llm_api_key",
  "device_token_clear",
  "device_token_get",
  "device_token_set",
  "get_agent_task_status",
  "has_llm_api_key",
  "has_provider_api_key",
  "input_click",
  "input_double_click",
  "input_hotkey",
  "input_scroll",
  "input_type",
  "list_agent_providers",
  "list_displays",
  "llm_propose_next_action",
  "main_window_hide",
  "main_window_show",
  "open_external_url",
  "permissions_get_status",
  "permissions_open_settings",
  "set_llm_api_key",
  "set_provider_api_key",
  "start_agent_task",
  "start_recording",
  "test_provider",
  "tool_execute",
  "tray_update_state",
  "workspace_clear",
  "workspace_configure",
  "workspace_get_state",
  "workspace_select_directory"
]

commands.deny = []
