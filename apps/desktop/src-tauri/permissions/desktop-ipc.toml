[[permission]]
identifier = "desktop-ipc"
description = "Allows the main desktop window to invoke the audited application IPC commands."

commands.allow = [
  "autostart_is_enabled",
  "autostart_set_enabled",
  "autostart_supported",
  "approve_agent_proposal",
  "cancel_agent_task",
  "capture_display_png",
  "clear_llm_api_key",
  "device_token_clear",
  "device_token_get",
  "device_token_set",
  "desktop_auth_listen_cancel",
  "desktop_auth_listen_finish",
  "desktop_auth_listen_start",
  "deny_agent_proposal",
  "get_agent_task_status",
  "has_llm_api_key",
  "has_provider_api_key",
  "input_click",
  "input_double_click",
  "input_hotkey",
  "input_scroll",
  "input_type",
  "local_ai_hardware_profile",
  "local_ai_install_progress",
  "local_ai_install_start",
  "local_ai_enable_vision_boost",
  "local_ai_recommended_tier",
  "local_ai_start",
  "local_ai_status",
  "local_ai_stop",
  "list_agent_providers",
  "list_displays",
  "llm_propose_next_action",
  "main_window_hide",
  "main_window_enter_overlay_mode",
  "main_window_exit_overlay_mode",
  "main_window_overlay_status",
  "main_window_show",
  "open_external_url",
  "permissions_get_status",
  "permissions_open_settings",
  "set_llm_api_key",
  "set_provider_api_key",
  "start_agent_task",
  "start_recording",
  "submit_agent_user_response",
  "test_provider",
  "tool_execute",
  "tray_update_state",
  "workspace_clear",
  "workspace_configure",
  "workspace_get_state",
  "workspace_select_directory"
]

commands.deny = []
